[pytest]
# Pytest configuration file

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests across modules
    slow: Slow tests (network, heavy computation)
    critical: Critical functionality tests
    edge_case: Edge case scenarios
    performance: Performance/load tests

# Coverage settings (if using pytest-cov)
# addopts = --cov=part_a_section1_spelling_corrector --cov=part_a_section2_sentiment --cov-report=html

# Timeout for long-running tests (if using pytest-timeout)
# timeout = 300
